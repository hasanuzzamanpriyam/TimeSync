name: Build TimeSync
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: TimeSync-x86_64.AppImage
            bundle: appimage
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: TimeSync.dmg
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: TimeSync-x86_64.msi
            bundle: msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install WiX (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet tool install --global wix-cli --version 5.2.1 2>&1 || echo "WiX install skipped/not needed"

      - name: Install npm dependencies
        run: npm ci

      - name: Check installed packages
        shell: bash
        run: |
          echo "=== node_modules/@radix-ui/react-tabs/ ==="
          ls -la node_modules/@radix-ui/react-tabs/dist/ 2>&1 || echo "DIST DIR NOT FOUND"
          echo "=== npm ls ==="
          npm ls @radix-ui/react-tabs 2>&1

      - name: Build frontend (TypeScript check)
        run: npx tsc --noEmit 2>&1

      - name: Build frontend (Vite bundle)
        run: npx vite build 2>&1

      - name: Build Tauri native app
        shell: bash
        run: |
          npx tauri build --verbose --bundles ${{ matrix.bundle }} 2>&1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: TimeSync-${{ matrix.os }}
          path: src-tauri/target/release/bundle/${{ matrix.bundle }}/*
