name: Build TimeSync
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: TimeSync-x86_64.AppImage
            bundle: appimage
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: TimeSync.dmg
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: TimeSync-x86_64.msi
            bundle: msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Check installed packages
        shell: bash
        run: |
          echo "=== node_modules/@radix-ui/react-tabs/ ==="
          ls -la node_modules/@radix-ui/react-tabs/dist/ 2>&1 || echo "DIST DIR NOT FOUND"
          echo "=== npm ls ==="
          npm ls @radix-ui/react-tabs 2>&1

      - name: Build frontend (TypeScript check)
        run: npx tsc --noEmit 2>&1

      - name: Build frontend (Vite bundle)
        run: npx vite build 2>&1

      - name: Build Tauri native app (with log capture)
        shell: bash
        run: |
          mkdir -p build-logs
          echo "PWD=$(pwd)" | tee build-logs/env.txt
          echo "RUNNER_OS=$RUNNER_OS" | tee -a build-logs/env.txt
          echo "=== dist/ contents ==="
          find dist/ -type f 2>&1 || echo "(no files)"
          echo "=== CARGO BUILD (release) ==="
          cd src-tauri
          cargo build --release 2>&1 | tee ${{ github.workspace }}/build-logs/cargo-build.txt || true
          CARGO_EXIT=${PIPESTATUS[0]}
          cd ${{ github.workspace }}
          echo "CARGO_EXIT=$CARGO_EXIT"
          if [ $CARGO_EXIT -ne 0 ]; then
            echo "=== CARGO BUILD LOG (last 10 lines) ==="
            tail -10 build-logs/cargo-build.txt
            LAST_LINE=$(tail -1 build-logs/cargo-build.txt)
            echo "::error title=Cargo build failed::$LAST_LINE"
            exit $CARGO_EXIT
          fi
          echo "=== Cargo build OK, running Tauri bundler ==="
          npx tauri build --verbose --bundles ${{ matrix.bundle }} 2>&1 | tee build-logs/tauri-build.txt || true
          TAURI_EXIT=${PIPESTATUS[0]}
          echo "TAURI_EXIT=$TAURI_EXIT"
          if [ $TAURI_EXIT -ne 0 ]; then
            echo "=== TAURI BUILD LOG (last 10 lines) ==="
            tail -10 build-logs/tauri-build.txt
            LAST_LINE=$(tail -1 build-logs/tauri-build.txt)
            echo "::error title=Tauri bundler failed::$LAST_LINE"
            exit $TAURI_EXIT
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: build-logs-${{ matrix.os }}
          path: build-logs/

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: TimeSync-${{ matrix.os }}
          path: src-tauri/target/release/bundle/${{ matrix.bundle }}/*
