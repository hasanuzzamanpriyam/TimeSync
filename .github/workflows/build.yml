name: Build TimeSync
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: TimeSync-x86_64.AppImage
            bundle: appimage
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: TimeSync.dmg
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: TimeSync-x86_64.msi
            bundle: msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install WiX (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dotnet tool install --global wix-cli --version 5.2.1 2>&1 || echo "WiX install skipped/not needed"

      - name: Install npm dependencies
        run: npm ci

      - name: Check installed packages
        shell: bash
        run: |
          echo "=== node_modules/@radix-ui/react-tabs/ ==="
          ls -la node_modules/@radix-ui/react-tabs/dist/ 2>&1 || echo "DIST DIR NOT FOUND"
          echo "=== npm ls ==="
          npm ls @radix-ui/react-tabs 2>&1 || true

      - name: Build frontend (TypeScript check)
        run: npx tsc --noEmit 2>&1

      - name: Build frontend (Vite bundle)
        run: npx vite build 2>&1

      - name: Check dist directory
        shell: bash
        run: |
          if [ -d "dist" ]; then
            echo "::notice::dist directory exists: $(ls dist/)"
          else
            echo "::error::dist directory NOT FOUND"
          fi

      - name: Try bare cargo build (diagnose)
        shell: bash
        run: |
          cd src-tauri
          cargo build --release 2>&1 | tee ../cargo-output.txt; EXIT_CODE=${PIPESTATUS[0]}
          cd ..
          echo "Cargo exit code: $EXIT_CODE"
          {
            echo "=== LAST 50 LINES ==="
            tail -50 cargo-output.txt 2>/dev/null || echo "(no output)"
            echo "=== ERROR LINES ==="
            grep -n '^error' cargo-output.txt 2>/dev/null || echo "(no error lines)"
            echo "=== LAST LINE ==="
            tail -1 cargo-output.txt 2>/dev/null
          } | tee -a cargo-summary.txt
          if [ $EXIT_CODE -ne 0 ]; then
            LAST_LINE=$(tail -1 cargo-output.txt 2>/dev/null)
            echo "::error title=cargo build failed::$LAST_LINE"
            exit $EXIT_CODE
          fi

      - name: Upload cargo build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: cargo-output-${{ matrix.os }}
          path: |
            cargo-output.txt
            cargo-summary.txt

      - name: Bundle Tauri app
        shell: bash
        run: |
          npx tauri build --bundles ${{ matrix.bundle }} 2>&1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: TimeSync-${{ matrix.os }}
          path: src-tauri/target/release/bundle/${{ matrix.bundle }}/*
